<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CUCHITEC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      background: #020617;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    header img {
      width: 60px;
      border-radius: 50%;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      color: #22c55e;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background: linear-gradient(90deg, #22c55e, #0ea5e9);
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #64748b;
    }

    /* BOTÓN WHATSAPP FLOTANTE */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #22c55e;
      padding: 15px;
      border-radius: 50%;
      font-size: 24px;
      text-decoration: none;
      color: black;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>CUCHITEC</h1>
</header>

<section class="hero">
  <h2>Tecnología de Calidad 🔥</h2>
  <p>Audífonos, Pawer Banks y accesorios originales</p>

  <a class="btn" href="https://wa.me/51999999999" target="_blank">
    Comprar ahora
  </a>
</section>

<section class="productos">

  <div class="card">
    <img src="https://via.placeholder.com/250">
    <h3>Audífonos Bluetooth</h3>
    <p>S/25 mayor</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250">
    <h3>Cargador Rápido</h3>
    <p>S/15 mayor</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250">
    <h3>Power Bank</h3>
    <p>S/45 mayor</p>
  </div>

</section>

<a class="whatsapp" href="https://wa.me/51929682090" target="_blank">
  💬
</a>

<div class="footer">
  © 2026 CUCHITEC
</div>

</body>
</html>
