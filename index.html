<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Importaciones CUCHITEC </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #0ea5e9, #22c55e);
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      margin-top: 20px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #020617;
    }
  </style>
</head>

<body>

<header>
  IMPORTACIONES SURITEC 🚀
</header>

<section class="hero">
  <h1>Venta Mayorista de Tecnología</h1>
  <p>Audífonos, cargadores, cables y más al mejor precio</p>
  
  <a class="btn" href="https://wa.me/51999999999" target="_blank">
    Comprar por WhatsApp
  </a>
</section>

<section class="productos">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Audífonos Bluetooth</h3>
    <p>S/25 por mayor</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Cargador Rápido</h3>
    <p>S/15 por mayor</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Power Bank</h3>
    <p>S/45 por mayor</p>
  </div>

</section>

<div class="footer">
  © 2026 Importaciones Suritec - Todos los derechos reservados
</div>

</body>
</html>
