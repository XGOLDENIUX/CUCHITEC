<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CUCHITEC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width:100%;
  border-radius:5px;
}

.card h3 {
  color:#22c55e;
}

.card p {
  color:#94a3b8;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  background:#22c55e;
  color:black;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}

</style>

</head>

<body>
<style>
body { font-family: Arial; background: #111; color: white; margin:0; }

header {
  display:flex;
  justify-content: space-between;
  padding:15px;
  background:black;
}

.productos {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#222;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

button {
  background:#22c55e;
  border:none;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

/* carrito */
.carrito {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#000;
  padding:20px;
  overflow:auto;
}

.item {
  border-bottom:1px solid gray;
  margin-bottom:10px;
}

.total {
  font-size:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <h2>CUCHITEC</h2>
  <button onclick="toggleCarrito()">🛒 Ver carrito</button>
</header>

<section class="productos">

  <div class="card">
    <h3>Audífonos Bluetooth</h3>
    <p>S/25</p>
    <button onclick="agregar('Audífonos Bluetooth',25)">Agregar</button>
  </div>
  
  <a href="producto-powerbank.html">
<div class="card" data-cat="audio"
     style="background:#1e293b; padding:15px; border-radius:15px; transition:0.3s;"
     onmouseover="this.style.transform='scale(1.05)'"
     onmouseout="this.style.transform='scale(1)'">

  <img src="https://www.peru-smart.com/wp-content/uploads/2024/12/CARG1005NEGRO_1.jpg"
       style="width:100%; border-radius:5px;">

  <h3 style="color:#22c55e;">Power Bank</h3>

  <p style="color:#94a3b8;">S/105</p>
  </a>

</div>

  <div class="card">
    <h3>Cargador Rápido</h3>
    <p>S/15</p>
    <button onclick="agregar('Cargador Rápido',15)">Agregar</button>
  </div>

</section>

<div class="carrito" id="carrito" style="display:none">
  <h2>Carrito</h2>
  <div id="items"></div>
  <div class="total" id="total"></div>

  <button onclick="finalizar()">Finalizar compra</button>
</div>

<script>
let carrito = [];

function agregar(nombre, precio) {
  let producto = carrito.find(p => p.nombre === nombre);

  if(producto){
    producto.cantidad++;
  } else {
    carrito.push({nombre, precio, cantidad:1});
  }

  render();
}

function render(){
  let html = "";
  let total = 0;

  carrito.forEach(p => {
    total += p.precio * p.cantidad;

    html += `
      <div class="item">
        ${p.nombre} x${p.cantidad} - S/${p.precio * p.cantidad}
      </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = "Total: S/" + total;
}

function toggleCarrito(){
  let c = document.getElementById("carrito");
  c.style.display = c.style.display === "none" ? "block" : "none";
}

function finalizar(){
  alert("Compra registrada (aquí conectas pagos luego)");
}
</script>

</body>
</html>
